services:
  db:
    image: postgres:16
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vip_network

  backend:
    build: ./backend
    command: gunicorn VIP_Transfer.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - vip_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vip_network

  cron:
    build: ./backend
    command: sh -c "crontab /app/crontab && cron -f"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - vip_network

volumes:
  postgres_data:

networks:
  vip_network:
    driver: bridge